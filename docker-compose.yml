services:
  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payflux-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (Nginx + Vite build) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string means the frontend will use relative /api/ URLs,
        # which Nginx proxies to the backend service
        VITE_API_URL: ""
    container_name: payflux-web
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
